name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: UI (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            electron-poc/package-lock.json

      - name: Install UI deps
        run: npm ci --prefix electron-poc

      - name: Typecheck
        run: npm run ui:typecheck

      - name: Unit tests
        run: npm run ui:test

  rust:
    name: Rust (test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo test (auto-detect)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "stemsep-backend/Cargo.toml" ]; then
            cargo test --manifest-path stemsep-backend/Cargo.toml
          elif [ -f "Cargo.toml" ]; then
            cargo test
          else
            echo "No Cargo.toml found; skipping Rust tests."
          fi

  python:
    name: Python (pytest)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            StemSepApp/requirements-dev.txt

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r StemSepApp/requirements-dev.txt
          python -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Guide Sync + Coverage Gate
        shell: pwsh
        run: |
          python scripts/registry/sync_guide_knowledge.py `
            --allow-fetch-failure `
            --max-age-days 90 `
            --max-unsynced-models 200 `
            --gate `
            --output-dir reports/guide_sync/ci

      - name: Pytest
        shell: pwsh
        run: |
          .\scripts\run_pytest.ps1 -q StemSepApp/tests
